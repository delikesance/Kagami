name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NIXPKGS_ALLOW_UNFREE: 1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cachix
        uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push container
        run: |
          # Lowercase the repository name for GHCR
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Determine the tag
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="latest"
          fi
          
          IMAGE_URI="${{ env.REGISTRY }}/${REPO_LOWER}:${TAG}"
          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV
          echo "Pushing to ${IMAGE_URI}..."
          
          # Use nix run to execute the latest devenv directly
          nix run github:cachix/devenv -- container copy kagami \
            --registry "docker://${{ env.REGISTRY }}/${REPO_LOWER%/*}/" \
            --option "containers.kagami.name:string" "${REPO_LOWER##*/}" \
            --option "containers.kagami.version:string" "${TAG}"

      - name: Summary
        run: |
          echo "### Image Published! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ env.IMAGE_URI }}\`" >> $GITHUB_STEP_SUMMARY
